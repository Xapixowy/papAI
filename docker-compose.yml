services:
  db:
    image: postgres:latest
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - pap-ai-network

  redis:
    image: redis:latest
    ports:
      - ${REDIS_PORT}:6379
    networks:
      - pap-ai-network

  app:
    build: .
    restart: always
    depends_on:
      - db
    ports:
      - '${APP_PORT}:${APP_PORT}'
    environment:
      - TZ=${APP_TIMEZONE}
    env_file:
      - .env
    networks:
      - pap-ai-network

volumes:
  db_data:

networks:
  pap-ai-network:
    driver: bridge
